AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AWS IoT FleetWise Electric Vehicle Simulation
Globals:
  Function:
    Timeout: 3

Parameters:
  SourceUrl:
    Description: Source Git clone URL for AWS IoT FleetWise Edge repo (leave as default)
    Type: String
    Default: https://github.com/aws/aws-iot-fleetwise-edge.git
  SourceRef:
    Description: Source Git branch, tag or commit ID (leave blank for HEAD)
    Type: String
    Default: "v1.3.2"
  SourceUrlBatteryMonitoring:
    Description: Source Git clone URL for Battery Monitoring Sample repo (leave as default)
    Type: String
    Default: https://github.com/aws-samples/aws-iot-fleetwise-evbatterymonitoring
  Ec2KeyPair:
    Description: Name of SSH key pair (leave blank for none)
    Type: String
    Default: ""
  FleetSize:
    Description: "Number of vehicles to create (this version of template only supports 1)"
    Type: String
    Default: "1"
    AllowedValues:
      - "1"
      - "2"
  IoTCoreRegion:
    Description: "Region in which to create IoT Things. This must be the same region used to create IoT FleetWise Vehicles."
    Type: String
    Default: "us-east-1"
    AllowedValues:
      - "us-east-1"
      - "eu-central-1"
  IoTCoreEndpointUrl:
    Description: "Endpoint URL for IoT Core (leave blank for automatic)"
    Type: String
    Default: ""
  IoTMqttTopicPrefix:
    Description: "IoT MQTT Topic prefix (leave as default)"
    Type: String
    Default: "$aws/iotfleetwise/"

  SkipTimesteamResourcesCreation:
    Description: "Skip creation of IoT Timesteam Resources (leave as default)"
    Type: String
    Default: "no"

Conditions:
  KeyPairSpecifiedCondition: !Not [!Equals [!Ref Ec2KeyPair, ""]]

  NeedToCreateTimesteamResources:
    !Equals [!Ref SkipTimesteamResourcesCreation, "no"]

Resources:
  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Instance security group
  Ec2SecurityGroupSshIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Allow inbound SSH access
      GroupId: !GetAtt Ec2SecurityGroup.GroupId
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: "0.0.0.0/0"
  Ec2SecurityGroupSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Allow access in same security group
      GroupId: !GetAtt Ec2SecurityGroup.GroupId
      IpProtocol: -1
      SourceSecurityGroupId: !GetAtt Ec2SecurityGroup.GroupId
  Ec2ServiceRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${AWS::StackName}-EC2-ServicePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:List*"
                  - "s3:Get*"
                Resource:
                  - arn:aws:s3:::*
  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref Ec2ServiceRole

  Ec2Instance1:
        Type: AWS::EC2::Instance
        CreationPolicy:
          ResourceSignal:
            Count: 1
            Timeout: PT30M
        Properties:
          ImageId: !FindInMap [AMIRegionMap, !Ref "AWS::Region", AMIID]
          MetadataOptions:
            HttpTokens: required
            HttpPutResponseHopLimit: 1
          BlockDeviceMappings:
            - DeviceName: /dev/sda1
              Ebs:
                VolumeSize: 100 # Increased to 100GB for C++ build overhead
                VolumeType: gp3
                DeleteOnTermination: true
          KeyName: !If [KeyPairSpecifiedCondition, !Ref Ec2KeyPair, !Ref "AWS::NoValue"]
          InstanceType: !FindInMap [FleetSizeEc2InstanceTypeMap, !Ref "FleetSize", InstanceType]
          IamInstanceProfile: !Ref Ec2InstanceProfile
          SecurityGroupIds: [ !Ref Ec2SecurityGroup ]
          Tags:
            - Key: Name
              Value: !Sub ${AWS::StackName}-Vehicle-01       

          UserData:
            Fn::Base64: !Sub |
              #!/bin/bash
              # -x: print commands, -e: exit on error
              set -xe

              # 1. Resilience: Retry loop for apt-get (handles network timeouts)
              for i in {1..5}; do
                apt-get update -y && break || (echo "Retry $i..." && sleep 20)
              done

              # 2. Install Verified 24.04 Packages
              # Note: setup-pollard-can-utils is replaced by standard can-utils
              for i in {1..5}; do
                apt-get install -y \
                  python3-pip \
                  python3-setuptools \
                  binutils \
                  can-utils \
                  clang-tidy \
                  git \
                  jq \
                  unzip \
                  htop && break || (echo "Retry $i..." && sleep 20)
              done

              # 3. Compiler Version Aliasing (The "Magic Trick")
              # Maps modern clang (v18) to v12 to keep legacy build scripts happy
              ln -s /usr/bin/clang-tidy /usr/bin/clang-tidy-12 || true
              ln -s /usr/bin/clang-format /usr/bin/clang-format-12 || true

              # 4. Install AWS CLI (Aarch64 for Graviton4)
              curl "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o "awscliv2.zip"
              unzip awscliv2.zip && ./aws/install && rm awscliv2.zip

              # 5. Build Environment Setup
              cd /home/ubuntu
              # Cloning before running scripts ensures directories exist
              sudo -u ubuntu git clone https://github.com/aws/aws-iot-fleetwise-edge.git
              cd aws-iot-fleetwise-edge

              # Patch the dependency script to remove version hardcoding
              sed -i 's/clang-tidy-12/clang-tidy/g' tools/install-deps-native.sh
              sed -i 's/clang-format-12/clang-format/g' tools/install-deps-native.sh

              # 6. Initialize Virtual CAN & Dependencies
              # Ubuntu 24.04 requires --break-system-packages for global pip
              ./tools/install-socketcan.sh --bus-count 1
              ./tools/install-deps-native.sh

              # 7. Heavy Compilation (5-10 minutes)
              sudo -u ubuntu ./tools/build-fwe-native.sh
              ./tools/install-fwe.sh

              # 8. Success Signal
              # Ensures CloudFormation turns Green only AFTER compilation finishes
              /usr/local/bin/cfn-signal --success true \
                --stack ${AWS::StackName} \
                --resource ${AWS::ElementName} \
                --region ${AWS::Region}

 
  Ec2Instance2:
        Type: AWS::EC2::Instance
        CreationPolicy:
          ResourceSignal:
            Count: 1
            Timeout: PT30M
        Properties:
          ImageId: !FindInMap [AMIRegionMap, !Ref "AWS::Region", AMIID]
          MetadataOptions:
            HttpTokens: required
            HttpPutResponseHopLimit: 1
          BlockDeviceMappings:
            - DeviceName: /dev/sda1
              Ebs:
                VolumeSize: 100
                VolumeType: gp3
                DeleteOnTermination: true
          KeyName: !If [KeyPairSpecifiedCondition, !Ref Ec2KeyPair, !Ref "AWS::NoValue"]
          InstanceType: !FindInMap [FleetSizeEc2InstanceTypeMap, !Ref "FleetSize", InstanceType]
          IamInstanceProfile: !Ref Ec2InstanceProfile
          SecurityGroupIds: [ !Ref Ec2SecurityGroup ]
          Tags:
            - Key: Name
              Value: !Sub ${AWS::StackName}-Vehicle-02
  
          UserData:
            Fn::Base64: !Sub |
              #!/bin/bash -xe
              # 1. Update and install basic dependencies
              apt-get update -y
              apt-get install -y python3-pip python3-setuptools binutils setup-pollard-can-utils
              
              # 2. Fix for Ubuntu 24.04: Map modern clang-tidy to version 12
              # The FleetWise script hard-codes 'clang-tidy-12', which doesn't exist in 24.04
              apt-get install -y clang-tidy
              ln -s /usr/bin/clang-tidy /usr/bin/clang-tidy-12
              ln -s /usr/bin/clang-format /usr/bin/clang-format-12

              # 3. Install AWS CLI (ARM64)
              curl "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o "awscliv2.zip"
              unzip awscliv2.zip
              ./aws/install

              # 4. Clone the Edge Agent and Patch the dependency script
              cd /home/ubuntu
              git clone https://github.com/aws/aws-iot-fleetwise-edge.git
              cd aws-iot-fleetwise-edge
              
              # This line replaces any hardcoded '12' versions in the script with the system default
              sed -i 's/clang-tidy-12/clang-tidy/g' tools/install-deps-native.sh
              sed -i 's/clang-format-12/clang-format/g' tools/install-deps-native.sh

              # 5. Run the build as the ubuntu user
              ./tools/install-deps-native.sh
              sudo -u ubuntu ./tools/build-fwe-native.sh

              # 6. Signal Success to CloudFormation
              /usr/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource VehicleNode01 --region ${AWS::Region}  
          
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Condition: NeedToCreateTimesteamResources
    Properties:
      DatabaseName: FleetWiseDatabase

  TimestreamTable:
    Type: AWS::Timestream::Table
    Condition: NeedToCreateTimesteamResources
    Properties:
      TableName: FleetWiseTable
      DatabaseName:
        Ref: TimestreamDatabase
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: "24"
        MagneticStoreRetentionPeriodInDays: "7"

  CreateThingFunction:
    Type: AWS::Lambda::Function
    Properties:
      Description: Create thing, certificate, and policy, return cert and private key
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Code:
        ZipFile: !Sub |
          import sys
          import cfnresponse
          import boto3
          from botocore.exceptions import ClientError
          import json
          import logging
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event, context):
              responseData = {}
              try:
                  logger.info('Received event: {}'.format(json.dumps(event)))
                  result = cfnresponse.FAILED
                  iotCoreEndpointUrl=event['ResourceProperties']['IoTCoreEndpointUrl']
                  iotCoreRegion=event['ResourceProperties']['IoTCoreRegion']
                  client = boto3.client(
                      'iot',
                      endpoint_url=None if iotCoreEndpointUrl=='' else iotCoreEndpointUrl,
                      region_name=iotCoreRegion)
                  inputThingName=event['ResourceProperties']['ThingName']
                  fleetSize=int(event['ResourceProperties']['FleetSize'])
                  if event['RequestType'] == 'Create':
                      logger.info('Creating cert...')
                      response = client.create_keys_and_certificate(
                          setAsActive=True
                      )
                      certId = response['certificateId']
                      certArn = response['certificateArn']
                      certPem = response['certificatePem']
                      privateKey = response['keyPair']['PrivateKey']
                      logger.info('Creating policy...')
                      policyDocument = '''{
                          "Version": "2012-10-17",
                          "Statement": [
                              {
                                  "Effect": "Allow",
                                  "Action": [
                                      "iot:Connect",
                                      "iot:Subscribe",
                                      "iot:Publish",
                                      "iot:Receive"
                                  ],
                                  "Resource": [
                                      "arn:aws:iot:%s:${AWS::AccountId}:client/*",
                                      "arn:aws:iot:%s:${AWS::AccountId}:topic/*",
                                      "arn:aws:iot:%s:${AWS::AccountId}:topicfilter/*"
                                  ]
                              }
                          ]
                      }''' % (iotCoreRegion, iotCoreRegion, iotCoreRegion)
                      response = client.create_policy(
                          policyName=inputThingName+'-policy',
                          policyDocument=policyDocument
                      )
                      for i in range(fleetSize):
                          thingName = inputThingName+("" if fleetSize==1 else "-"+str(i))
                          logger.info('Creating thing %s...' % thingName)
                          thing = client.create_thing(
                              thingName=thingName
                          )
                          response = client.attach_policy(
                              policyName=inputThingName+'-policy',
                              target=certArn,
                          )
                          response = client.attach_thing_principal(
                              thingName=thingName,
                              principal=certArn,
                          )
                      responseData['certificateId'] = certId
                      responseData['certificatePem'] = certPem
                      responseData['privateKey'] = privateKey
                      responseData['iotEndpoint'] = client.describe_endpoint(endpointType='iot:Data-ATS')['endpointAddress']
                      result = cfnresponse.SUCCESS
                  elif event['RequestType'] == 'Update':
                      result = cfnresponse.SUCCESS
                  elif event['RequestType'] == 'Delete':
                      for i in range(fleetSize):
                          thingName = inputThingName+("" if fleetSize==1 else "-"+str(i))
                          logger.info('Deleting thing %s...' % thingName)
                          response = client.list_thing_principals(
                              thingName=thingName
                          )
                          for j in response['principals']:
                              response = client.detach_thing_principal(
                                  thingName=thingName,
                                  principal=j
                              )
                              response = client.detach_policy(
                                  policyName=inputThingName+'-policy',
                                  target=j
                              )
                              response = client.delete_thing(
                                  thingName=thingName
                              )
                      logger.info('Deleting policy...')
                      response = client.delete_policy(
                          policyName=inputThingName+'-policy'
                      )
                      certId = j.split('/')[-1]
                      logger.info('Deleting cert %s...' % certId)
                      response = client.update_certificate(
                          certificateId=certId,
                          newStatus='INACTIVE'
                      )
                      response = client.delete_certificate(
                          certificateId=certId,
                          forceDelete=True
                      )
                      result = cfnresponse.SUCCESS
              except ClientError as e:
                  logger.error('Error: {}'.format(e))
                  result = cfnresponse.FAILED
              logger.info('Returning response of: {}, with result of: {}'.format(result, responseData))
              sys.stdout.flush()
              cfnresponse.send(event, context, result, responseData)

  IoTThing1:
    Type: Custom::IoTThing1
    Properties:
      ServiceToken: !GetAtt CreateThingFunction.Arn
      ThingName: "blog-vehicle-01"
      FleetSize: "1"
      IoTCoreRegion: !Ref IoTCoreRegion
      IoTCoreEndpointUrl: !Ref IoTCoreEndpointUrl

  IoTThing2:
    Type: Custom::IoTThing2
    Properties:
      ServiceToken: !GetAtt CreateThingFunction.Arn
      ThingName: "blog-vehicle-02"
      FleetSize: "1"
      IoTCoreRegion: !Ref IoTCoreRegion
      IoTCoreEndpointUrl: !Ref IoTCoreEndpointUrl

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${AWS::StackName}-Lambda-ExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: "*"
              - Effect: Allow
                Action:
                  - "iot:CreateKeysAndCertificate"
                  - "iot:DescribeEndpoint"
                  - "iot:AttachThingPrincipal"
                  - "iot:DetachThingPrincipal"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "iot:CreateThing"
                  - "iot:CreatePolicy"
                  - "iot:AttachPolicy"
                  - "iot:ListThingPrincipals"
                  - "iot:DetachPolicy"
                  - "iot:UpdateCertificate"
                  - "iot:DeleteCertificate"
                  - "iot:DeletePolicy"
                  - "iot:DeleteThing"
                Resource:
                  - !Sub arn:aws:iot:${IoTCoreRegion}:${AWS::AccountId}:thing/*
                  - !Sub arn:aws:iot:${IoTCoreRegion}:${AWS::AccountId}:cert/*
                  - !Sub arn:aws:iot:${IoTCoreRegion}:${AWS::AccountId}:policy/*
Mappings:
  AMIRegionMap:
    us-east-1:
      AMIID: ami-0bc0f64eea5d47edf  # Verified Arm64
    us-east-2:
      AMIID: ami-0275817a3a9018e6c  # Verified Arm64
    us-west-2:
      AMIID: ami-047a505f037be3a7d  # Verified Arm64
    eu-central-1:
      AMIID: ami-043516556e409f874  # Verified Arm64
    eu-west-1:
      AMIID: ami-0568015f8e029497e  # Verified Arm64
    ap-northeast-1:
      AMIID: ami-002d01859666c8916  # Verified Arm64
    ap-southeast-1:
      AMIID: ami-0143896504a372173  # Verified Arm64      
      
  FleetSizeEc2InstanceTypeMap:
    "1":
      InstanceType: c8g.xlarge  #m8g.xlarge
    "2":
      InstanceType: m6g.2xlarge
    "10":
      InstanceType: m6g.16xlarge
    "100":
      InstanceType: m6g.16xlarge
    "1000":
      InstanceType: m6g.16xlarge
Outputs:
  Ec2Instance1PublicIp:
    Condition: KeyPairSpecifiedCondition
    Description: "EC2 instance 1 public IP address"
    Value: !GetAtt Ec2Instance1.PublicIp

  Ec2Instance1SSH:
    Condition: KeyPairSpecifiedCondition
    Description: "EC2 instance 1 SSH access command"
    Value: !Sub ssh -i ~/${Ec2KeyPair}.pem ubuntu@${Ec2Instance1.PublicIp}

  Ec2Instance2PublicIp:
    Condition: KeyPairSpecifiedCondition
    Description: "EC2 instance 2 public IP address"
    Value: !GetAtt Ec2Instance2.PublicIp

  Ec2Instance2SSH:
    Condition: KeyPairSpecifiedCondition
    Description: "EC2 instance 2 SSH access command"
    Value: !Sub ssh -i ~/${Ec2KeyPair}.pem ubuntu@${Ec2Instance2.PublicIp}
