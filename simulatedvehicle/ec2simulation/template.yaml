AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AWS IoT FleetWise Electric Vehicle Simulation
Globals:
  Function:
    Timeout: 3

Parameters:
  SourceUrl:
    Description: Source Git clone URL for AWS IoT FleetWise Edge repo (leave as default)
    Type: String
    Default: https://github.com/aws/aws-iot-fleetwise-edge.git
  SourceRef:
    Description: Source Git branch, tag or commit ID (leave blank for HEAD)
    Type: String
    Default: "v1.3.2"
  SourceUrlBatteryMonitoring:
    Description: Source Git clone URL for Battery Monitoring Sample repo (leave as default)
    Type: String
    Default: https://github.com/aws-samples/aws-iot-fleetwise-evbatterymonitoring
  Ec2KeyPair:
    Description: Name of SSH key pair (leave blank for none)
    Type: String
    Default: ""
  FleetSize:
    Description: "Number of vehicles to create (this version of template only supports 1)"
    Type: String
    Default: "1"
    AllowedValues:
      - "1"
      - "2"
  IoTCoreRegion:
    Description: "Region in which to create IoT Things. This must be the same region used to create IoT FleetWise Vehicles."
    Type: String
    Default: "us-east-1"
    AllowedValues:
      - "us-east-1"
      - "eu-central-1"
  IoTCoreEndpointUrl:
    Description: "Endpoint URL for IoT Core (leave blank for automatic)"
    Type: String
    Default: ""
  IoTMqttTopicPrefix:
    Description: "IoT MQTT Topic prefix (leave as default)"
    Type: String
    Default: "$aws/iotfleetwise/"

  SkipTimesteamResourcesCreation:
    Description: "Skip creation of IoT Timesteam Resources (leave as default)"
    Type: String
    Default: "no"

Conditions:
  KeyPairSpecifiedCondition: !Not [!Equals [!Ref Ec2KeyPair, ""]]

  NeedToCreateTimesteamResources:
    !Equals [!Ref SkipTimesteamResourcesCreation, "no"]

Resources:
  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Instance security group
  Ec2SecurityGroupSshIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Allow inbound SSH access
      GroupId: !GetAtt Ec2SecurityGroup.GroupId
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: "0.0.0.0/0"
  Ec2SecurityGroupSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Allow access in same security group
      GroupId: !GetAtt Ec2SecurityGroup.GroupId
      IpProtocol: -1
      SourceSecurityGroupId: !GetAtt Ec2SecurityGroup.GroupId
  Ec2ServiceRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${AWS::StackName}-EC2-ServicePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:List*"
                  - "s3:Get*"
                Resource:
                  - arn:aws:s3:::*
  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref Ec2ServiceRole

  Ec2Instance1:
        Type: AWS::EC2::Instance
        CreationPolicy:
          ResourceSignal:
            Count: 1
            Timeout: PT30M
        Properties:
          ImageId: !FindInMap [AMIRegionMap, !Ref "AWS::Region", AMIID]
          BlockDeviceMappings:
            - DeviceName: /dev/sda1
              Ebs:
                VolumeSize: 100 # Increased to 100GB for C++ build overhead
                VolumeType: gp3
                DeleteOnTermination: true
          KeyName: !If [KeyPairSpecifiedCondition, !Ref Ec2KeyPair, !Ref "AWS::NoValue"]
          InstanceType: !FindInMap [FleetSizeEc2InstanceTypeMap, !Ref "FleetSize", InstanceType]
          IamInstanceProfile: !Ref Ec2InstanceProfile
          SecurityGroupIds: [ !Ref Ec2SecurityGroup ]
          Tags:
            - Key: Name
              Value: !Sub ${AWS::StackName}-Vehicle-01
          UserData:
            Fn::Base64: !Sub |
              #!/bin/bash
              set -euo pipefail

              # Wait for any existing package install to finish
              i=0
              while true; do
                if sudo fuser /var/{lib/{dpkg,apt/lists},cache/apt/archives}/lock >/dev/null 2>&1; then
                  i=0
                else
                  i=$((i + 1))
                  if [ "$i" -ge 10 ]; then break; fi
                fi
                sleep 1
              done

              # Upgrade system (Reboot handled by cloud-init if necessary, but we continue for speed)
              apt update && apt upgrade -y
              apt install -y python3-pip python3-setuptools python3-venv python3-numpy python3-pandas git ec2-instance-connect htop jq unzip

              # Install helper scripts (cfn-bootstrap)
              mkdir -p /opt/aws/bin
              wget https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz
              python3 -m pip install aws-cfn-bootstrap-py3-latest.tar.gz --break-system-packages
              
              # On error, signal failure
              error_handler() {
                /usr/local/bin/cfn-signal --success false --stack ${AWS::StackName} --resource Ec2Instance1 --region ${AWS::Region}
              }
              trap error_handler ERR

              # System Tuning
              echo 1048576 > /proc/sys/kernel/pid_max
              systemctl stop syslog.socket rsyslog.service || true
              printf "RateLimitBurst=0\nSystemMaxUse=1G\n" >> /etc/systemd/journald.conf

              # Python Dependencies for 2026 (Handling PEP 668)
              python3 -m pip install --upgrade pip --break-system-packages
              python3 -m pip install cython cantools can-isotp --break-system-packages

              # Install AWS CLI (ARM64 for Graviton)
              curl "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o "awscliv2.zip"
              unzip awscliv2.zip && ./aws/install && rm awscliv2.zip

              # Clone Repos
              cd /home/ubuntu
              sudo -u ubuntu git clone ${SourceUrlBatteryMonitoring}
              sudo -u ubuntu git clone ${SourceUrl} aws-iot-fleetwise-edge
              
              cd aws-iot-fleetwise-edge
              if [ "${SourceRef}" != "" ]; then
                sudo -u ubuntu git checkout ${SourceRef}
              fi

              # Install SocketCAN
              ./tools/install-socketcan.sh --bus-count ${FleetSize}

              # Provision Credentials
              mkdir -p /etc/aws-iot-fleetwise /var/aws-iot-fleetwise
              echo -n "${IoTThing1.certificatePem}" > /etc/aws-iot-fleetwise/certificate.pem
              echo -n "${IoTThing1.privateKey}" > /etc/aws-iot-fleetwise/private-key.key
              chmod 600 /etc/aws-iot-fleetwise/private-key.key
              chown -R ubuntu:ubuntu /etc/aws-iot-fleetwise /var/aws-iot-fleetwise

              # Configuration Logic (Fixed BATCH_SIZE syntax)
              if [ "${FleetSize}" == "1" ]; then
                ./tools/configure-fwe.sh \
                  --input-config-file "configuration/static-config.json" \
                  --output-config-file "/etc/aws-iot-fleetwise/config-0.json" \
                  --vehicle-name "blog-vehicle-01" \
                  --endpoint-url "${IoTThing1.iotEndpoint}" \
                  --topic-prefix '${IoTMqttTopicPrefix}' \
                  --can-bus0 "vcan0"
              else
                BATCH_SIZE=$(( $(nproc) * 4 ))
                for ((i=0; i<${FleetSize}; i+=BATCH_SIZE)); do
                  for ((j=0; j<BATCH_SIZE && i+j<${FleetSize}; j++)); do
                    {
                      idx=$((i+j))
                      mkdir -p /var/aws-iot-fleetwise/fwe$idx
                      ./tools/configure-fwe.sh \
                        --input-config-file "configuration/static-config.json" \
                        --output-config-file "/etc/aws-iot-fleetwise/config-$idx.json" \
                        --vehicle-name "blog-vehicle-01-$idx" \
                        --endpoint-url "${IoTThing1.iotEndpoint}" \
                        --topic-prefix '${IoTMqttTopicPrefix}' \
                        --can-bus0 "vcan$idx" \
                        --persistency-path "/var/aws-iot-fleetwise/fwe$idx"
                    } &
                  done
                  wait
                done
              fi

              # Build and Install (C++ compilation happens here)
              ./tools/install-deps-native.sh
              sudo -u ubuntu ./tools/build-fwe-native.sh
              ./tools/install-fwe.sh

              # Service setup
              ROOTDIR=/home/ubuntu/aws-iot-fleetwise-evbatterymonitoring/simulatedvehicle/canreplay
              cp -f $ROOTDIR/service/evcansimulation.blog-vehicle-01.service /etc/systemd/system/evcansimulation.service
              systemctl daemon-reload
              systemctl enable evcansimulation.service
              systemctl start evcansimulation.service

              # Final Success Signal
              /usr/local/bin/cfn-signal --success true --stack ${AWS::StackName} --resource Ec2Instance1 --region ${AWS::Region}
  Ec2Instance2:
        Type: AWS::EC2::Instance
        CreationPolicy:
          ResourceSignal:
            Count: 1
            Timeout: PT30M
        Properties:
          ImageId: !FindInMap [AMIRegionMap, !Ref "AWS::Region", AMIID]
          BlockDeviceMappings:
            - DeviceName: /dev/sda1
              Ebs:
                VolumeSize: 100
                VolumeType: gp3
                DeleteOnTermination: true
          KeyName: !If [KeyPairSpecifiedCondition, !Ref Ec2KeyPair, !Ref "AWS::NoValue"]
          InstanceType: !FindInMap [FleetSizeEc2InstanceTypeMap, !Ref "FleetSize", InstanceType]
          IamInstanceProfile: !Ref Ec2InstanceProfile
          SecurityGroupIds: [ !Ref Ec2SecurityGroup ]
          Tags:
            - Key: Name
              Value: !Sub ${AWS::StackName}-Vehicle-02
          UserData:
            Fn::Base64: !Sub |
              #!/bin/bash
              set -euo pipefail

              # ... (Standard apt updates and tool installs same as Instance 1) ...
              apt update && apt upgrade -y
              apt install -y python3-pip python3-setuptools python3-venv python3-numpy python3-pandas git ec2-instance-connect htop jq unzip
              mkdir -p /opt/aws/bin
              wget https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz
              python3 -m pip install aws-cfn-bootstrap-py3-latest.tar.gz --break-system-packages

              error_handler() {
                /usr/local/bin/cfn-signal --success false --stack ${AWS::StackName} --resource Ec2Instance2 --region ${AWS::Region}
              }
              trap error_handler ERR

              python3 -m pip install cython cantools can-isotp --break-system-packages
              curl "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o "awscliv2.zip"
              unzip awscliv2.zip && ./aws/install && rm awscliv2.zip

              cd /home/ubuntu
              sudo -u ubuntu git clone ${SourceUrlBatteryMonitoring}
              sudo -u ubuntu git clone ${SourceUrl} aws-iot-fleetwise-edge
              cd aws-iot-fleetwise-edge

              ./tools/install-socketcan.sh --bus-count ${FleetSize}

              # PROVISIONING FOR VEHICLE 2 (Updated IoTThing references)
              mkdir -p /etc/aws-iot-fleetwise /var/aws-iot-fleetwise
              echo -n "${IoTThing2.certificatePem}" > /etc/aws-iot-fleetwise/certificate.pem
              echo -n "${IoTThing2.privateKey}" > /etc/aws-iot-fleetwise/private-key.key
              chmod 600 /etc/aws-iot-fleetwise/private-key.key
              chown -R ubuntu:ubuntu /etc/aws-iot-fleetwise /var/aws-iot-fleetwise

              if [ "${FleetSize}" == "1" ]; then
                ./tools/configure-fwe.sh \
                  --input-config-file "configuration/static-config.json" \
                  --output-config-file "/etc/aws-iot-fleetwise/config-0.json" \
                  --vehicle-name "blog-vehicle-02" \
                  --endpoint-url "${IoTThing2.iotEndpoint}" \
                  --topic-prefix '${IoTMqttTopicPrefix}' \
                  --can-bus0 "vcan0"
              fi

              ./tools/install-deps-native.sh
              sudo -u ubuntu ./tools/build-fwe-native.sh
              ./tools/install-fwe.sh

              ROOTDIR=/home/ubuntu/aws-iot-fleetwise-evbatterymonitoring/simulatedvehicle/canreplay
              cp -f $ROOTDIR/service/evcansimulation.blog-vehicle-02.service /etc/systemd/system/evcansimulation.service
              systemctl daemon-reload
              systemctl enable evcansimulation.service
              systemctl start evcansimulation.service

              /usr/local/bin/cfn-signal --success true --stack ${AWS::StackName} --resource Ec2Instance2 --region ${AWS::Region} 
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Condition: NeedToCreateTimesteamResources
    Properties:
      DatabaseName: FleetWiseDatabase

  TimestreamTable:
    Type: AWS::Timestream::Table
    Condition: NeedToCreateTimesteamResources
    Properties:
      TableName: FleetWiseTable
      DatabaseName:
        Ref: TimestreamDatabase
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: "24"
        MagneticStoreRetentionPeriodInDays: "7"

  CreateThingFunction:
    Type: AWS::Lambda::Function
    Properties:
      Description: Create thing, certificate, and policy, return cert and private key
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Code:
        ZipFile: !Sub |
          import sys
          import cfnresponse
          import boto3
          from botocore.exceptions import ClientError
          import json
          import logging
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event, context):
              responseData = {}
              try:
                  logger.info('Received event: {}'.format(json.dumps(event)))
                  result = cfnresponse.FAILED
                  iotCoreEndpointUrl=event['ResourceProperties']['IoTCoreEndpointUrl']
                  iotCoreRegion=event['ResourceProperties']['IoTCoreRegion']
                  client = boto3.client(
                      'iot',
                      endpoint_url=None if iotCoreEndpointUrl=='' else iotCoreEndpointUrl,
                      region_name=iotCoreRegion)
                  inputThingName=event['ResourceProperties']['ThingName']
                  fleetSize=int(event['ResourceProperties']['FleetSize'])
                  if event['RequestType'] == 'Create':
                      logger.info('Creating cert...')
                      response = client.create_keys_and_certificate(
                          setAsActive=True
                      )
                      certId = response['certificateId']
                      certArn = response['certificateArn']
                      certPem = response['certificatePem']
                      privateKey = response['keyPair']['PrivateKey']
                      logger.info('Creating policy...')
                      policyDocument = '''{
                          "Version": "2012-10-17",
                          "Statement": [
                              {
                                  "Effect": "Allow",
                                  "Action": [
                                      "iot:Connect",
                                      "iot:Subscribe",
                                      "iot:Publish",
                                      "iot:Receive"
                                  ],
                                  "Resource": [
                                      "arn:aws:iot:%s:${AWS::AccountId}:client/*",
                                      "arn:aws:iot:%s:${AWS::AccountId}:topic/*",
                                      "arn:aws:iot:%s:${AWS::AccountId}:topicfilter/*"
                                  ]
                              }
                          ]
                      }''' % (iotCoreRegion, iotCoreRegion, iotCoreRegion)
                      response = client.create_policy(
                          policyName=inputThingName+'-policy',
                          policyDocument=policyDocument
                      )
                      for i in range(fleetSize):
                          thingName = inputThingName+("" if fleetSize==1 else "-"+str(i))
                          logger.info('Creating thing %s...' % thingName)
                          thing = client.create_thing(
                              thingName=thingName
                          )
                          response = client.attach_policy(
                              policyName=inputThingName+'-policy',
                              target=certArn,
                          )
                          response = client.attach_thing_principal(
                              thingName=thingName,
                              principal=certArn,
                          )
                      responseData['certificateId'] = certId
                      responseData['certificatePem'] = certPem
                      responseData['privateKey'] = privateKey
                      responseData['iotEndpoint'] = client.describe_endpoint(endpointType='iot:Data-ATS')['endpointAddress']
                      result = cfnresponse.SUCCESS
                  elif event['RequestType'] == 'Update':
                      result = cfnresponse.SUCCESS
                  elif event['RequestType'] == 'Delete':
                      for i in range(fleetSize):
                          thingName = inputThingName+("" if fleetSize==1 else "-"+str(i))
                          logger.info('Deleting thing %s...' % thingName)
                          response = client.list_thing_principals(
                              thingName=thingName
                          )
                          for j in response['principals']:
                              response = client.detach_thing_principal(
                                  thingName=thingName,
                                  principal=j
                              )
                              response = client.detach_policy(
                                  policyName=inputThingName+'-policy',
                                  target=j
                              )
                              response = client.delete_thing(
                                  thingName=thingName
                              )
                      logger.info('Deleting policy...')
                      response = client.delete_policy(
                          policyName=inputThingName+'-policy'
                      )
                      certId = j.split('/')[-1]
                      logger.info('Deleting cert %s...' % certId)
                      response = client.update_certificate(
                          certificateId=certId,
                          newStatus='INACTIVE'
                      )
                      response = client.delete_certificate(
                          certificateId=certId,
                          forceDelete=True
                      )
                      result = cfnresponse.SUCCESS
              except ClientError as e:
                  logger.error('Error: {}'.format(e))
                  result = cfnresponse.FAILED
              logger.info('Returning response of: {}, with result of: {}'.format(result, responseData))
              sys.stdout.flush()
              cfnresponse.send(event, context, result, responseData)

  IoTThing1:
    Type: Custom::IoTThing1
    Properties:
      ServiceToken: !GetAtt CreateThingFunction.Arn
      ThingName: "blog-vehicle-01"
      FleetSize: "1"
      IoTCoreRegion: !Ref IoTCoreRegion
      IoTCoreEndpointUrl: !Ref IoTCoreEndpointUrl

  IoTThing2:
    Type: Custom::IoTThing2
    Properties:
      ServiceToken: !GetAtt CreateThingFunction.Arn
      ThingName: "blog-vehicle-02"
      FleetSize: "1"
      IoTCoreRegion: !Ref IoTCoreRegion
      IoTCoreEndpointUrl: !Ref IoTCoreEndpointUrl

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${AWS::StackName}-Lambda-ExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: "*"
              - Effect: Allow
                Action:
                  - "iot:CreateKeysAndCertificate"
                  - "iot:DescribeEndpoint"
                  - "iot:AttachThingPrincipal"
                  - "iot:DetachThingPrincipal"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "iot:CreateThing"
                  - "iot:CreatePolicy"
                  - "iot:AttachPolicy"
                  - "iot:ListThingPrincipals"
                  - "iot:DetachPolicy"
                  - "iot:UpdateCertificate"
                  - "iot:DeleteCertificate"
                  - "iot:DeletePolicy"
                  - "iot:DeleteThing"
                Resource:
                  - !Sub arn:aws:iot:${IoTCoreRegion}:${AWS::AccountId}:thing/*
                  - !Sub arn:aws:iot:${IoTCoreRegion}:${AWS::AccountId}:cert/*
                  - !Sub arn:aws:iot:${IoTCoreRegion}:${AWS::AccountId}:policy/*
