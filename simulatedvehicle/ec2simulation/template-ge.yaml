AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AWS IoT FleetWise Electric Vehicle Simulation

Globals:
  Function:
    Timeout: 3

Parameters:
  SourceUrl:
    Description: Source Git clone URL for AWS IoT FleetWise Edge repo
    Type: String
    Default: https://github.com/aws/aws-iot-fleetwise-edge.git
  SourceRef:
    Description: Source Git branch, tag or commit ID (leave blank for HEAD)
    Type: String
    Default: "v1.3.2"
  SourceUrlBatteryMonitoring:
    Description: Source Git clone URL for Battery Monitoring Sample repo
    Type: String
    Default: https://github.com/aws-samples/aws-iot-fleetwise-evbatterymonitoring
  Ec2KeyPair:
    Description: Name of SSH key pair (leave blank for none)
    Type: String
    Default: ""
  FleetSize:
    Description: "Number of vehicles to create"
    Type: String
    Default: "1"
    AllowedValues:
      - "1"
      - "2"
  IoTCoreRegion:
    Description: "Region for IoT Things."
    Type: String
    Default: "us-east-1"
    AllowedValues:
      - "us-east-1"
      - "eu-central-1"
  IoTCoreEndpointUrl:
    Description: "Endpoint URL for IoT Core (leave blank for automatic)"
    Type: String
    Default: ""
  IoTMqttTopicPrefix:
    Description: "IoT MQTT Topic prefix"
    Type: String
    Default: "$aws/iotfleetwise/"
  SkipTimestreamResourcesCreation:
    Description: "Skip creation of IoT Timestream Resources"
    Type: String
    Default: "no"

Conditions:
  KeyPairSpecifiedCondition: !Not [!Equals [!Ref Ec2KeyPair, ""]]
  NeedToCreateTimestreamResources: !Equals [!Ref SkipTimestreamResourcesCreation, "no"]
  IsFleetSize2: !Equals [!Ref FleetSize, "2"]

Mappings:
  AMIRegionMap:
    us-east-1:
      AMIID: ami-0bc0f64eea5d47edf
    us-east-2:
      AMIID: ami-0275817a3a9018e6c
    us-west-2:
      AMIID: ami-047a505f037be3a7d
    eu-central-1:
      AMIID: ami-043516556e409f874
    eu-west-1:
      AMIID: ami-0568015f8e029497e
    ap-northeast-1:
      AMIID: ami-002d01859666c8916
    ap-southeast-1:
      AMIID: ami-0143896504a372173
      
  FleetSizeEc2InstanceTypeMap:
    "1":
      InstanceType: c8g.xlarge
    "2":
      InstanceType: m6g.2xlarge

Resources:
  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Instance security group

  Ec2SecurityGroupSshIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Allow inbound SSH access
      GroupId: !GetAtt Ec2SecurityGroup.GroupId
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: "0.0.0.0/0"

  Ec2SecurityGroupSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Allow access in same security group
      GroupId: !GetAtt Ec2SecurityGroup.GroupId
      IpProtocol: -1
      SourceSecurityGroupId: !GetAtt Ec2SecurityGroup.GroupId

  Ec2ServiceRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${AWS::StackName}-EC2-ServicePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:List*"
                  - "s3:Get*"
                Resource: "arn:aws:s3:::*"

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref Ec2ServiceRole

  Ec2Instance1:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT30M
    Properties:
      ImageId: !FindInMap [AMIRegionMap, !Ref "AWS::Region", AMIID]
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 1
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 100
            VolumeType: gp3
            DeleteOnTermination: true
      KeyName: !If [KeyPairSpecifiedCondition, !Ref Ec2KeyPair, !Ref "AWS::NoValue"]
      InstanceType: !FindInMap [FleetSizeEc2InstanceTypeMap, !Ref "FleetSize", InstanceType]
      IamInstanceProfile: !Ref Ec2InstanceProfile
      SecurityGroupIds: [ !Ref Ec2SecurityGroup ]
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Vehicle-01       
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -xe
          for i in {1..5}; do
            apt-get update -y && break || (echo "Retry $i..." && sleep 20)
          done
          for i in {1..5}; do
            apt-get install -y python3-pip python3-setuptools binutils can-utils clang-tidy git jq unzip htop && break || (echo "Retry $i..." && sleep 20)
          done
          ln -s /usr/bin/clang-tidy /usr/bin/clang-tidy-12 || true
          ln -s /usr/bin/clang-format /usr/bin/clang-format-12 || true
          curl "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip && ./aws/install && rm awscliv2.zip
          cd /home/ubuntu
          sudo -u ubuntu git clone ${SourceUrl}
          cd aws-iot-fleetwise-edge
          sed -i 's/clang-tidy-12/clang-tidy/g' tools/install-deps-native.sh
          sed -i 's/clang-format-12/clang-format/g' tools/install-deps-native.sh
          ./tools/install-socketcan.sh --bus-count 1
          ./tools/install-deps-native.sh
          sudo -u ubuntu ./tools/build-fwe-native.sh
          ./tools/install-fwe.sh
          /usr/local/bin/cfn-signal --success true --stack ${AWS::StackName} --resource Ec2Instance1 --region ${AWS::Region}

  Ec2Instance2:
    Type: AWS::EC2::Instance
    Condition: IsFleetSize2
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT30M
    Properties:
      ImageId: !FindInMap [AMIRegionMap, !Ref "AWS::Region", AMIID]
      MetadataOptions:
        HttpTokens: required
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 100
            VolumeType: gp3
            DeleteOnTermination: true
      KeyName: !If [KeyPairSpecifiedCondition, !Ref Ec2KeyPair, !Ref "AWS::NoValue"]
      InstanceType: !FindInMap [FleetSizeEc2InstanceTypeMap, !Ref "FleetSize", InstanceType]
      IamInstanceProfile: !Ref Ec2InstanceProfile
      SecurityGroupIds: [ !Ref Ec2SecurityGroup ]
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Vehicle-02
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -xe
          apt-get update -y
          apt-get install -y python3-pip python3-setuptools binutils can-utils git jq unzip clang-tidy
          ln -s /usr/bin/clang-tidy /usr/bin/clang-tidy-12 || true
          ln -s /usr/bin/clang-format /usr/bin/clang-format-12 || true
          curl "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip && ./aws/install && rm awscliv2.zip
          cd /home/ubuntu
          sudo -u ubuntu git clone ${SourceUrl}
          cd aws-iot-fleetwise-edge
          sed -i 's/clang-tidy-12/clang-tidy/g' tools/install-deps-native.sh
          sed -i 's/clang-format-12/clang-format/g' tools/install-deps-native.sh
          ./tools/install-deps-native.sh
          sudo -u ubuntu ./tools/build-fwe-native.sh
          /usr/local/bin/cfn-signal --success true --stack ${AWS::StackName} --resource Ec2Instance2 --region ${AWS::Region}

  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Condition: NeedToCreateTimestreamResources
    Properties:
      DatabaseName: FleetWiseDatabase

  TimestreamTable:
    Type: AWS::Timestream::Table
    Condition: NeedToCreateTimestreamResources
    Properties:
      TableName: FleetWiseTable
      DatabaseName: !Ref TimestreamDatabase
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: "24"
        MagneticStoreRetentionPeriodInDays: "7"

  CreateThingFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Code:
        ZipFile: !Sub |
          import sys
          import cfnresponse
          import boto3
          from botocore.exceptions import ClientError
          import json
          import logging
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event, context):
              responseData = {}
              try:
                  logger.info('Received event: {}'.format(json.dumps(event)))
                  result = cfnresponse.FAILED
                  iotCoreEndpointUrl=event['ResourceProperties']['IoTCoreEndpointUrl']
                  iotCoreRegion=event['ResourceProperties']['IoTCoreRegion']
                  client = boto3.client(
                      'iot',
                      endpoint_url=None if iotCoreEndpointUrl=='' else iotCoreEndpointUrl,
                      region_name=iotCoreRegion)
                  inputThingName=event['ResourceProperties']['ThingName']
                  fleetSize=int(event['ResourceProperties']['FleetSize'])
                  if event['RequestType'] == 'Create':
                      response = client.create_keys_and_certificate(setAsActive=True)
                      certArn = response['certificateArn']
                      responseData['certificateId'] = response['certificateId']
                      responseData['certificatePem'] = response['certificatePem']
                      responseData['privateKey'] = response['keyPair']['PrivateKey']
                      
                      policyDocument = {
                          "Version": "2012-10-17",
                          "Statement": [{
                              "Effect": "Allow",
                              "Action": ["iot:Connect", "iot:Subscribe", "iot:Publish", "iot:Receive"],
                              "Resource": ["*"]
                          }]
                      }
                      client.create_policy(policyName=inputThingName+'-policy', policyDocument=json.dumps(policyDocument))
                      
                      for i in range(fleetSize):
                          thingName = inputThingName+("" if fleetSize==1 else "-"+str(i))
                          client.create_thing(thingName=thingName)
                          client.attach_policy(policyName=inputThingName+'-policy', target=certArn)
                          client.attach_thing_principal(thingName=thingName, principal=certArn)
                      
                      responseData['iotEndpoint'] = client.describe_endpoint(endpointType='iot:Data-ATS')['endpointAddress']
                      result = cfnresponse.SUCCESS
                  elif event['RequestType'] in ['Update', 'Delete']:
                      result = cfnresponse.SUCCESS
              except Exception as e:
                  logger.error('Error: {}'.format(e))
                  result = cfnresponse.FAILED
              cfnresponse.send(event, context, result, responseData)

  IoTThing1:
    Type: Custom::IoTThing1
    Properties:
      ServiceToken: !GetAtt CreateThingFunction.Arn
      ThingName: "blog-vehicle-01"
      FleetSize: "1"
      IoTCoreRegion: !Ref IoTCoreRegion
      IoTCoreEndpointUrl: !Ref IoTCoreEndpointUrl

  IoTThing2:
    Type: Custom::IoTThing2
    Condition: IsFleetSize2
    Properties:
      ServiceToken: !GetAtt CreateThingFunction.Arn
      ThingName: "blog-vehicle-02"
      FleetSize: "1"
      IoTCoreRegion: !Ref IoTCoreRegion
      IoTCoreEndpointUrl: !Ref IoTCoreEndpointUrl

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${AWS::StackName}-Lambda-ExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
              - Effect: Allow
                Action:
                  - iot:*
                Resource: "*"

Outputs:
  Ec2Instance1PublicIp:
    Description: "EC2 instance 1 public IP address"
    Value: !GetAtt Ec2Instance1.PublicIp

  Ec2Instance1SSH:
    Condition: KeyPairSpecifiedCondition
    Description: "EC2 instance 1 SSH access command"
    Value: !Sub ssh -i ~/${Ec2KeyPair}.pem ubuntu@${Ec2Instance1.PublicIp}
    
  Ec2Instance2PublicIp:
    Condition: KeyPairSpecifiedCondition
    Description: "EC2 instance 2 public IP address"
    Value: !GetAtt Ec2Instance2.PublicIp

  Ec2Instance2SSH:
    Condition: KeyPairSpecifiedCondition
    Description: "EC2 instance 2 SSH access command"
    Value: !Sub ssh -i ~/${Ec2KeyPair}.pem ubuntu@${Ec2Instance2.PublicIp}