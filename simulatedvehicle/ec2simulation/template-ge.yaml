AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AWS IoT FleetWise EV Simulation - Multi-Vehicle Team Version (Ubuntu 24.04)

Parameters:
  Ec2KeyPair:
    Type: String
    Description: Name of SSH key pair (leave blank for none)
    Default: ""
  FleetSize:
    Type: String
    Default: "1"
    AllowedValues: ["1", "2"]
  IoTCoreRegion:
    Type: String
    Default: "us-east-1"
    AllowedValues: ["us-east-1", "us-east-2", "us-west-2", "eu-central-1", "eu-west-1"]

Conditions:
  IsFleetSize2: !Equals [!Ref FleetSize, "2"]
  KeyPairSpecified: !Not [!Equals [!Ref Ec2KeyPair, ""]]

Mappings:
  AMIRegionMap:
    us-east-1: {AMIID: ami-0bc0f64eea5d47edf}
    us-east-2: {AMIID: ami-0275817a3a9018e6c}
    us-west-2: {AMIID: ami-047a505f037be3a7d}
    eu-central-1: {AMIID: ami-043516556e409f874}
    eu-west-1: {AMIID: ami-0568015f8e029497e}

Resources:
  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Instance security group
  Ec2SecurityGroupSshIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Allow inbound SSH access
      GroupId: !GetAtt Ec2SecurityGroup.GroupId
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: "0.0.0.0/0"
  Ec2SecurityGroupSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Allow access in same security group
      GroupId: !GetAtt Ec2SecurityGroup.GroupId
      IpProtocol: -1
      SourceSecurityGroupId: !GetAtt Ec2SecurityGroup.GroupId
  # --- DATABASE LAYER ---
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: FleetWiseDatabase

  TimestreamTable:
    Type: AWS::Timestream::Table
    Properties:
      TableName: FleetWiseTable
      DatabaseName: !Ref TimestreamDatabase
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: "24"
        MagneticStoreRetentionPeriodInDays: "1"

  # --- PROVISIONING LAYER (Lambda) ---
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement: [{Effect: Allow, Principal: {Service: lambda.amazonaws.com}, Action: "sts:AssumeRole"}]
      Policies:
        - PolicyName: IoTProvisioningPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ["logs:*", "iot:*"]
                Resource: "*"
# lambda triigered by actions on cloudformation
 
  CreateThingFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Code:
        ZipFile: !Sub |
          import cfnresponse, boto3, json
          def handler(event, context):
              responseData = {}
              iot = boto3.client('iot', region_name='${AWS::Region}')
              try:
                  thing_name = event['ResourceProperties']['ThingName']
                  policy_name = thing_name + '-policy'

                  if event['RequestType'] == 'Create':
                      # --- CREATE LOGIC ---
                      keys = iot.create_keys_and_certificate(setAsActive=True)
                      cert_arn = keys['certificateArn']
                      responseData.update({
                          'certificatePem': keys['certificatePem'],
                          'privateKey': keys['keyPair']['PrivateKey'],
                          'iotEndpoint': iot.describe_endpoint(endpointType='iot:Data-ATS')['endpointAddress']
                      })
                      policy = {"Version": "2012-10-17", "Statement": [{"Effect": "Allow", "Action": ["iot:*"], "Resource": ["*"]}]}
                      iot.create_policy(policyName=policy_name, policyDocument=json.dumps(policy))
                      iot.create_thing(thingName=thing_name)
                      iot.attach_policy(policyName=policy_name, target=cert_arn)
                      iot.attach_thing_principal(thingName=thing_name, principal=cert_arn)
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData)

                  elif event['RequestType'] == 'Delete':
                      # --- DELETE LOGIC ---
                      try:
                          # 1. Find all certificates (principals) attached to this thing
                          principals = iot.list_thing_principals(thingName=thing_name).get('principals', [])
                          for cert_arn in principals:
                              # 2. Detach and cleanup each certificate
                              iot.detach_thing_principal(thingName=thing_name, principal=cert_arn)
                              try:
                                  iot.detach_policy(policyName=policy_name, target=cert_arn)
                              except: pass
                              
                              cert_id = cert_arn.split('/')[-1]
                              iot.update_certificate(certificateId=cert_id, newStatus='INACTIVE')
                              iot.delete_certificate(certificateId=cert_id, forceDelete=True)
                          
                          # 3. Delete the Thing and the Policy
                          iot.delete_thing(thingName=thing_name)
                          iot.delete_policy(policyName=policy_name)
                      except Exception as e:
                          print(f"Cleanup warning: {e}")
                      
                      # Always send SUCCESS on delete so the stack isn't held hostage
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData)

                  elif event['RequestType'] == 'Update':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData)

              except Exception as e:
                  print(f"Error: {e}")
                  # If we fail on Create, signal failure. If we fail on Delete, signal success anyway.
                  status = cfnresponse.FAILED if event['RequestType'] != 'Delete' else cfnresponse.SUCCESS
                  cfnresponse.send(event, context, status, {"Error": str(e)})  
  
  IoTThing1:
    Type: Custom::IoTThing
    Properties:
      ServiceToken: !GetAtt CreateThingFunction.Arn
      ThingName: blog-vehicle-01

  IoTThing2:
    Type: Custom::IoTThing
    Condition: IsFleetSize2
    Properties:
      ServiceToken: !GetAtt CreateThingFunction.Arn
      ThingName: blog-vehicle-02

  # --- COMPUTE LAYER (EC2) ---
  Ec2ServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement: [{Effect: Allow, Principal: {Service: ec2.amazonaws.com}, Action: "sts:AssumeRole"}]
      Policies:
        - PolicyName: FleetWiseAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ["s3:*", "timestream:*", "iot:Publish", "iot:Subscribe", "iot:Connect", "iot:Receive"]
                Resource: "*"

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref Ec2ServiceRole]

  Ec2Instance1:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal: {Count: 1, Timeout: PT30M}
    Properties:
      ImageId: !FindInMap [AMIRegionMap, !Ref "AWS::Region", AMIID]
      SecurityGroupIds: !Split [",", !GetAtt Ec2SecurityGroup.GroupId]
      InstanceType: c8g.xlarge
      IamInstanceProfile: !Ref Ec2InstanceProfile
      KeyName: !If [KeyPairSpecified, !Ref Ec2KeyPair, !Ref "AWS::NoValue"]
      
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -xe
          export DEBIAN_FRONTEND=noninteractive
          export PIP_BREAK_SYSTEM_PACKAGES=1
          
          # This ensures the PEP 668 error never happens, even under sudo
          rm -f /usr/lib/python3.12/EXTERNALLY-MANAGED

          # 1. Noble Fixes (Packages & Symlinks)
          apt-get update -y
          apt-get install -y python3-pip python3-setuptools binutils can-utils git jq unzip htop \
                              libprotobuf-dev protobuf-compiler libboost-all-dev libssl-dev \
                              libcurl4-openssl-dev pkg-config cmake clang-tidy clang-format
          
          # Fix for FleetWise script dependencies
          ln -s /usr/bin/clang-tidy /usr/bin/clang-tidy-12 || true
          ln -s /usr/bin/clang-format /usr/bin/clang-format-12 || true

          # ... rest of your script ...    
      

 
 
  Ec2Instance2:
    Type: AWS::EC2::Instance
    Condition: IsFleetSize2
    CreationPolicy:
      ResourceSignal: {Count: 1, Timeout: PT30M}
    Properties:
      ImageId: !FindInMap [AMIRegionMap, !Ref "AWS::Region", AMIID]
      SecurityGroupIds: !Split [",", !GetAtt Ec2SecurityGroup.GroupId]
      InstanceType: c8g.xlarge
      IamInstanceProfile: !Ref Ec2InstanceProfile
      KeyName: !If [KeyPairSpecified, !Ref Ec2KeyPair, !Ref "AWS::NoValue"]

      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -xe
          export DEBIAN_FRONTEND=noninteractive
          export PIP_BREAK_SYSTEM_PACKAGES=1
          
          # This ensures the PEP 668 error never happens, even under sudo
          rm -f /usr/lib/python3.12/EXTERNALLY-MANAGED

          # 1. Noble Fixes (Packages & Symlinks)
          apt-get update -y
          apt-get install -y python3-pip python3-setuptools binutils can-utils git jq unzip htop \
                              libprotobuf-dev protobuf-compiler libboost-all-dev libssl-dev \
                              libcurl4-openssl-dev pkg-config cmake clang-tidy clang-format
          
          # Fix for FleetWise script dependencies
          ln -s /usr/bin/clang-tidy /usr/bin/clang-tidy-12 || true
          ln -s /usr/bin/clang-format /usr/bin/clang-format-12 || true

          # ... rest of your script ...

Outputs:
  Ec2Instance1PublicIp:
    Description: "Public IP address of the first vehicle simulation"
    Value: !GetAtt Ec2Instance1.PublicIp

  Ec2Instance1SSH:
    Condition: KeyPairSpecified
    Description: "SSH command to connect to Vehicle 1"
    Value: !Sub ssh -i ~/${Ec2KeyPair}.pem ubuntu@${Ec2Instance1.PublicIp}

  Ec2Instance2PublicIp:
    Condition: IsFleetSize2
    Description: "Public IP address of the second vehicle simulation"
    Value: !GetAtt Ec2Instance2.PublicIp

  Ec2Instance2SSH:
    Condition: IsFleetSize2
    # This nested check ensures we only show SSH if both a 2nd instance and a KeyPair exist
    Value: !If 
      - KeyPairSpecified
      - !Sub "ssh -i ~/${Ec2KeyPair}.pem ubuntu@${Ec2Instance2.PublicIp}"
      - !Ref "AWS::NoValue"

  TimestreamDatabaseName:
    Description: "The name of the created Timestream Database"
    Value: !Ref TimestreamDatabase

  TimestreamTableName:
    Description: "The name of the created Timestream Table"
    Value: !Ref TimestreamTable

  IoTEndpoint:
    Description: "The IoT ATS Endpoint used by the vehicles"
    Value: !GetAtt IoTThing1.iotEndpoint