AWSTemplateFormatVersion: "2010-09-09"
Description: AWS IoT FleetWise EV Simulation - Ubuntu 24.04 (Fixed Idempotency & UserData)

Parameters:
  Ec2KeyPair:
    Type: String
    Description: Name of SSH key pair (leave blank for none)
    Default: ""
  FleetSize:
    Type: String
    Default: "1"
    AllowedValues: ["1", "2"]
  IoTCoreRegion:
    Type: String
    Default: "us-east-1"
    AllowedValues: ["us-east-1", "us-east-2", "us-west-2", "eu-central-1", "eu-west-1"]
  SshCidr:
    Type: String
    Default: "0.0.0.0/0"
    Description: CIDR block for SSH access (change to your IP for production)

Conditions:
  IsFleetSize2: !Equals [!Ref FleetSize, "2"]
  KeyPairSpecified: !Not [!Equals [!Ref Ec2KeyPair, ""]]

Mappings:
  AMIRegionMap:
    us-east-1: { AMIID: "ami-01a2996ca45a3a3b1" }
    us-east-2: { AMIID: "ami-0b7ac63ed6aebcc83" }
    us-west-2: { AMIID: "ami-073ed67f4e90c9cc0" }
    eu-central-1: { AMIID: "ami-0d61e97f110565325" }
    eu-west-1: { AMIID: "ami-03a5a0c94efde632c" }

Resources:
  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Instance security group

  Ec2SecurityGroupSshIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !GetAtt Ec2SecurityGroup.GroupId
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: !Ref SshCidr

  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: !Sub "FleetWiseDB-${AWS::StackName}"

  TimestreamTable:
    Type: AWS::Timestream::Table
    Properties:
      TableName: FleetWiseTable
      DatabaseName: !Ref TimestreamDatabase
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: "24"
        MagneticStoreRetentionPeriodInDays: "7"

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: IoTProvisioningPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - iot:*
                  - secretsmanager:*
                Resource: "*"

  CreateThingFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Code:
        ZipFile: !Sub |
          import cfnresponse, boto3, json, logging
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event, context):
              responseData = {}
              iot = boto3.client('iot', region_name='${AWS::Region}')
              secrets = boto3.client('secretsmanager', region_name='${AWS::Region}')
              
              try:
                  thing_name = event['ResourceProperties']['ThingName']
                  secret_name = f"fleetwise/{thing_name}/credentials"
                  policy_name = f"{thing_name}-policy"

                  if event['RequestType'] in ['Create', 'Update']:
                      # 1. Create Keys
                      keys = iot.create_keys_and_certificate(setAsActive=True)
                      cert_arn = keys['certificateArn']
                      cert_pem = keys['certificatePem']
                      private_key = keys['keyPair']['PrivateKey']

                      # 2. Create/Handle Policy
                      policy_doc = {
                          "Version": "2012-10-17",
                          "Statement": [{
                              "Effect": "Allow",
                              "Action": ["iot:Connect", "iot:Publish", "iot:Subscribe", "iot:Receive"],
                              "Resource": ["*"]
                          }]
                      }
                      try:
                          iot.create_policy(policyName=policy_name, policyDocument=json.dumps(policy_doc))
                      except iot.exceptions.ResourceAlreadyExistsException:
                          logger.info(f"Policy {policy_name} already exists. Skipping.")

                      # 3. Create/Handle Thing
                      try:
                          iot.create_thing(thingName=thing_name)
                      except iot.exceptions.ResourceAlreadyExistsException:
                          logger.info(f"Thing {thing_name} already exists. Skipping.")

                      # 4. Attachments
                      iot.attach_policy(policyName=policy_name, target=cert_arn)
                      iot.attach_thing_principal(thingName=thing_name, principal=cert_arn)

                      # 5. Store in Secrets Manager
                      secret_value = {"certificatePem": cert_pem, "privateKey": private_key}
                      try:
                          secrets.create_secret(Name=secret_name, SecretString=json.dumps(secret_value))
                      except secrets.exceptions.ResourceExistsException:
                          secrets.update_secret(SecretId=secret_name, SecretString=json.dumps(secret_value))

                      # Always provide these for the stack to continue
                      responseData['secretArn'] = secrets.describe_secret(SecretId=secret_name)['ARN']
                      responseData['iotEndpoint'] = iot.describe_endpoint(endpointType='iot:Data-ATS')['endpointAddress']
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData)

                  elif event['RequestType'] == 'Delete':
                      try:
                          principals = iot.list_thing_principals(thingName=thing_name).get('principals', [])
                          for arn in principals:
                              iot.detach_thing_principal(thingName=thing_name, principal=arn)
                              cert_id = arn.split('/')[-1]
                              iot.update_certificate(certificateId=cert_id, newStatus='INACTIVE')
                              iot.delete_certificate(certificateId=cert_id, forceDelete=True)
                          iot.delete_thing(thingName=thing_name)
                          iot.delete_policy(policyName=policy_name)
                          secrets.delete_secret(SecretId=secret_name, ForceDeleteWithoutRecovery=True)
                      except Exception as e:
                          logger.warning(f"Cleanup error: {e}")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData)

              except Exception as e:
                  logger.error(f"Lambda failed: {e}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Error": str(e)})

  IoTThing1:
    Type: Custom::IoTThing
    Properties:
      ServiceToken: !GetAtt CreateThingFunction.Arn
      ThingName: "blog-vehicle-01"

  IoTThing2:
    Type: Custom::IoTThing
    Condition: IsFleetSize2
    Properties:
      ServiceToken: !GetAtt CreateThingFunction.Arn
      ThingName: "blog-vehicle-02"

  Ec2ServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: FleetWiseInstancePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - timestream:WriteRecords
                  - iot:*
                  - secretsmanager:GetSecretValue
                Resource: "*"

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref Ec2ServiceRole]

  Ec2Instance1:
    Type: AWS::EC2::Instance
    DependsOn: [IoTThing1, TimestreamTable]
    CreationPolicy:
      ResourceSignal: { Count: 1, Timeout: PT45M }
    Properties:
      ImageId: !FindInMap [AMIRegionMap, !Ref "AWS::Region", AMIID]
      InstanceType: c8g.xlarge
      IamInstanceProfile: !Ref Ec2InstanceProfile
      SecurityGroupIds: [!Ref Ec2SecurityGroup]
      KeyName: !If [KeyPairSpecified, !Ref Ec2KeyPair, !Ref "AWS::NoValue"]
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 50
            VolumeType: gp3
            DeleteOnTermination: true
      MetadataOptions:
        HttpTokens: required
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          exec > >(tee /var/log/user-data.log|logger -t user-data -s 2>/dev/console) 2>&1
          TOKEN=$(curl -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
          INSTANCE_ID=$(curl -H "X-aws-ec2-metadata-token: $TOKEN" -s http://169.254.169.254/latest/meta-data/instance-id)
          
          error_handler() {
            /usr/local/bin/aws cloudformation signal-resource --stack-name ${AWS::StackName} --logical-resource-id Ec2Instance1 --unique-id "$INSTANCE_ID" --status FAILURE --region ${AWS::Region} || true
          }
          trap error_handler ERR
          
          apt-get update -y
          apt-get install -y build-essential python3-pip can-utils git jq unzip libssl-dev cmake clang-tidy clang-format libboost-all-dev
          curl "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o "awscliv2.zip"
          unzip -o awscliv2.zip && ./aws/install && rm -rf awscliv2.zip aws/

          SECRET_ARN="${IoTThing1.secretArn}"
          echo "Fetching secret $SECRET_ARN"
          aws secretsmanager get-secret-value --secret-id "$SECRET_ARN" --query SecretString --output text > /tmp/secret.json
          
          CERT_PEM=$(jq -r .certificatePem < /tmp/secret.json)
          PRIVATE_KEY=$(jq -r .privateKey < /tmp/secret.json)
          
          cd /home/ubuntu
          sudo -u ubuntu git clone https://github.com/aws/aws-iot-fleetwise-edge.git
          cd aws-iot-fleetwise-edge
          ./tools/install-socketcan.sh --bus-count 1
          sudo ./tools/install-deps-native.sh
          
          AWSSDK_DIR="/usr/local/lib/cmake/AWSSDK"
          [ -d "/usr/local/share/cmake/AWSSDK" ] && AWSSDK_DIR="/usr/local/share/cmake/AWSSDK"
          
          sudo -u ubuntu bash -c "export AWSSDK_DIR='$AWSSDK_DIR' && ./tools/build-fwe-native.sh"
          
          mkdir -p /etc/aws-iot-fleetwise
          echo "$CERT_PEM" > /etc/aws-iot-fleetwise/certificate.pem
          echo "$PRIVATE_KEY" > /etc/aws-iot-fleetwise/private.key
          curl -s https://www.amazontrust.com/repository/AmazonRootCA1.pem -o /etc/aws-iot-fleetwise/AmazonRootCA1.pem
          openssl rsa -in /etc/aws-iot-fleetwise/private.key -out /etc/aws-iot-fleetwise/private.key -traditional
          
          ./tools/configure-fwe.sh --input-config-file configuration/static-config.json \
            --output-config-file /etc/aws-iot-fleetwise/config-0.json \
            --vehicle-name blog-vehicle-01 --endpoint-url ${IoTThing1.iotEndpoint} \
            --certificate /etc/aws-iot-fleetwise/certificate.pem --private-key /etc/aws-iot-fleetwise/private.key \
            --root-ca /etc/aws-iot-fleetwise/AmazonRootCA1.pem
          
          sudo ./tools/install-fwe.sh /etc/aws-iot-fleetwise/config-0.json
          systemctl start fwe
          
          /usr/local/bin/aws cloudformation signal-resource --stack-name ${AWS::StackName} --logical-resource-id Ec2Instance1 --unique-id "$INSTANCE_ID" --status SUCCESS --region ${AWS::Region}

  Ec2Instance2:
    Type: AWS::EC2::Instance
    Condition: IsFleetSize2
    DependsOn: [IoTThing2, TimestreamTable]
    CreationPolicy:
      ResourceSignal: { Count: 1, Timeout: PT45M }
    Properties:
      ImageId: !FindInMap [AMIRegionMap, !Ref "AWS::Region", AMIID]
      InstanceType: c8g.xlarge
      IamInstanceProfile: !Ref Ec2InstanceProfile
      SecurityGroupIds: [!Ref Ec2SecurityGroup]
      KeyName: !If [KeyPairSpecified, !Ref Ec2KeyPair, !Ref "AWS::NoValue"]
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 50
            VolumeType: gp3
            DeleteOnTermination: true
      MetadataOptions:
        HttpTokens: required
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          exec > >(tee /var/log/user-data.log|logger -t user-data -s 2>/dev/console) 2>&1
          TOKEN=$(curl -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
          INSTANCE_ID=$(curl -H "X-aws-ec2-metadata-token: $TOKEN" -s http://169.254.169.254/latest/meta-data/instance-id)
          
          error_handler() {
            /usr/local/bin/aws cloudformation signal-resource --stack-name ${AWS::StackName} --logical-resource-id Ec2Instance2 --unique-id "$INSTANCE_ID" --status FAILURE --region ${AWS::Region} || true
          }
          trap error_handler ERR
          
          apt-get update -y
          apt-get install -y build-essential python3-pip can-utils git jq unzip libssl-dev cmake clang-tidy clang-format libboost-all-dev
          curl "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o "awscliv2.zip"
          unzip -o awscliv2.zip && ./aws/install && rm -rf awscliv2.zip aws/

          SECRET_ARN="${IoTThing2.secretArn}"
          echo "Fetching secret $SECRET_ARN"
          aws secretsmanager get-secret-value --secret-id "$SECRET_ARN" --query SecretString --output text > /tmp/secret.json
          
          CERT_PEM=$(jq -r .certificatePem < /tmp/secret.json)
          PRIVATE_KEY=$(jq -r .privateKey < /tmp/secret.json)
          
          cd /home/ubuntu
          sudo -u ubuntu git clone https://github.com/aws/aws-iot-fleetwise-edge.git
          cd aws-iot-fleetwise-edge
          ./tools/install-socketcan.sh --bus-count 1
          sudo ./tools/install-deps-native.sh
          
          AWSSDK_DIR="/usr/local/lib/cmake/AWSSDK"
          [ -d "/usr/local/share/cmake/AWSSDK" ] && AWSSDK_DIR="/usr/local/share/cmake/AWSSDK"
          
          sudo -u ubuntu bash -c "export AWSSDK_DIR='$AWSSDK_DIR' && ./tools/build-fwe-native.sh"
          
          mkdir -p /etc/aws-iot-fleetwise
          echo "$CERT_PEM" > /etc/aws-iot-fleetwise/certificate.pem
          echo "$PRIVATE_KEY" > /etc/aws-iot-fleetwise/private.key
          curl -s https://www.amazontrust.com/repository/AmazonRootCA1.pem -o /etc/aws-iot-fleetwise/AmazonRootCA1.pem
          openssl rsa -in /etc/aws-iot-fleetwise/private.key -out /etc/aws-iot-fleetwise/private.key -traditional
          
          ./tools/configure-fwe.sh --input-config-file configuration/static-config.json \
            --output-config-file /etc/aws-iot-fleetwise/config-0.json \
            --vehicle-name blog-vehicle-02 --endpoint-url ${IoTThing2.iotEndpoint} \
            --certificate /etc/aws-iot-fleetwise/certificate.pem --private-key /etc/aws-iot-fleetwise/private.key \
            --root-ca /etc/aws-iot-fleetwise/AmazonRootCA1.pem
          
          sudo ./tools/install-fwe.sh /etc/aws-iot-fleetwise/config-0.json
          systemctl start fwe
          
          /usr/local/bin/aws cloudformation signal-resource --stack-name ${AWS::StackName} --logical-resource-id Ec2Instance2 --unique-id "$INSTANCE_ID" --status SUCCESS --region ${AWS::Region}

Outputs:
  Ec2Instance1PublicIp: { Value: !GetAtt Ec2Instance1.PublicIp }
  Ec2Instance2PublicIp: { Condition: IsFleetSize2, Value: !GetAtt Ec2Instance2.PublicIp }